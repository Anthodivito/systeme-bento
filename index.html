<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>systeme.anthonycarrel.com / architecture multi-links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=500;600;700&family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<style>
  :root {
    --gold: #FFB03B; --source: #12D99B; --cockpit: #3B9CFF; --moteur: #A56CFF; --objectifs: #38D4F8;
    --bg-main: #0B0B0E;        
    --panel-border: rgba(255,255,255,0.08);
    --text: #E3E4E8; --dim: #626775;
    --grid-opacity: 0.03;
  }
  
  /* Thème Clair */
  body.light-theme {
    --bg-main: #F4F5F8;
    --panel-border: rgba(0,0,0,0.08);
    --text: #1A1C23; --dim: #787F95;
    --grid-opacity: 0.06;
  }
  
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-main); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; -webkit-tap-highlight-color: transparent; transition: background 0.3s, color 0.3s; }
  
  .app-container { display: flex; flex-direction: column; height: 100vh; background: var(--bg-main); position: relative; }
  
  .header-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: rgba(0,0,0,0.05); border-bottom: 1px solid var(--panel-border); z-index: 110; gap: 12px; }
  body.light-theme .header-nav { background: #FFFFFF; }
  .tabs { display: flex; gap: 8px; }
  .tab { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--dim); cursor: pointer; user-select: none; }
  .tab.active { background: rgba(255,255,255,0.04); color: var(--text); border: 1px solid var(--panel-border); }
  body.light-theme .tab.active { background: rgba(0,0,0,0.02); }
  
  .view-toggle { display: none; gap: 4px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 8px; border: 1px solid var(--panel-border); }
  .toggle-btn { background: none; border: none; color: var(--dim); padding: 6px 12px; font-size: 11px; font-weight: 600; border-radius: 6px; cursor: pointer; font-family: inherit; }
  .toggle-btn.active { background: var(--panel-border); color: var(--text); }

  .actions-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .btn-primary { background: var(--text); color: var(--bg-main); border: none; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; user-select: none; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-tool { background: transparent; border: 1px solid var(--panel-border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 500; }
  .btn-tool:hover { background: rgba(255,255,255,0.05); }
  
  .search-input { background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border); border-radius: 8px; padding: 8px 12px; color: #fff; font-size: 12px; font-family: inherit; width: 160px; }
  body.light-theme .search-input { background: #FFF; color: #000; }

  .canvas-container {
    flex: 1; position: relative; width: 100%; overflow: hidden;
    background-image: radial-gradient(rgba(255, 255, 255, var(--grid-opacity)) 1px, transparent 1px);
    background-size: 32px 32px;
    touch-action: none;
  }
  body.light-theme .canvas-container {
    background-image: radial-gradient(rgba(0, 0, 0, var(--grid-opacity)) 1px, transparent 1px);
  }
  
  .pan-zoom-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; will-change: transform; }
  .connector-svg { position: absolute; inset: 0; width: 5000px; height: 5000px; pointer-events: none; z-index: 1; }

  .node {
    position: absolute; z-index: 5; touch-action: none;
    border: 1px solid color-mix(in srgb, var(--nc) 40%, transparent);
    border-radius: 12px; padding: 16px; 
    box-shadow: 0 0 25px -4px color-mix(in srgb, var(--nc) 50%, transparent),
                0 20px 40px rgba(0, 0, 0, 0.7), 
                0 0 0 1px rgba(0, 0, 0, 0.5);
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    overflow: hidden;
  }
  body.light-theme .node { box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
  
  .node.bento-style {
    background: #111216;
    border: 1px solid rgba(56, 212, 248, 0.2);
    box-shadow: 0 0 40px -5px rgba(56, 212, 248, 0.15), 0 30px 60px rgba(0,0,0,0.8);
  }

  .node:hover { 
    border-color: color-mix(in srgb, var(--nc) 80%, transparent); 
    box-shadow: 0 0 35px -2px color-mix(in srgb, var(--nc) 75%, transparent),
                0 25px 50px rgba(0, 0, 0, 0.9);
  }
  
  .node-bg-layer { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; pointer-events: none; }
  .node-overlay { content: ''; position: absolute; inset: 0; background: rgba(20, 21, 26, 0.4); z-index: 1; pointer-events: none; }
  .node-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
  
  .node-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
  .header-actions { display: flex; gap: 8px; }

  .icon-badge {
    width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--nc) 15%, rgba(0,0,0,0.4)); color: var(--nc); font-size: 14px;
    border: 1px solid color-mix(in srgb, var(--nc) 30%, transparent); box-shadow: 0 0 12px -4px var(--nc);
  }
  
  .action-btn {
    background: transparent; border: 1px dashed color-mix(in srgb, var(--nc) 40%, transparent);
    color: var(--dim); width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  .action-btn:hover { color: var(--text); border-color: var(--nc); background: rgba(255,255,255,0.05); }
  
  .title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; color: var(--text); outline: none; }
  .sub { font-size: 11px; color: var(--dim); outline: none; margin-top: 4px; line-height: 1.4; margin-bottom: 8px; }
  
  .tags-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; margin-bottom: 8px; padding-top: 4px; }
  .tag-item {
    font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 5px;
    background: color-mix(in srgb, var(--tc) 12%, rgba(0,0,0,0.6));
    color: var(--tc); border: 1px solid color-mix(in srgb, var(--tc) 40%, transparent);
    box-shadow: 0 0 14px -2px color-mix(in srgb, var(--tc) 50%, transparent);
    outline: none;
  }

  .bullets-container { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; margin-bottom: 10px; overflow-y: auto; flex: 1; pointer-events: auto; }
  .bullet-item { display: flex; align-items: center; gap: 8px; font-size: 11px; line-height: 1.3; color: var(--text); position: relative; }
  
  .bullet-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--nc); flex-shrink: 0; box-shadow: 0 0 8px var(--nc); }
  .bullet-checkbox { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--dim); background: transparent; flex-shrink: 0; cursor: pointer; transition: all 0.2s; }
  .bullet-item.checked .bullet-checkbox { background: var(--nc); border-color: var(--nc); box-shadow: 0 0 8px var(--nc); }
  .bullet-item.checked .bullet-text { color: var(--dim); text-decoration: line-through; }

  .bullet-text { flex: 1; outline: none; min-height: 14px; word-break: break-word; }
  .bullet-text:empty::before { content: "Nouvel objectif..."; color: var(--dim); font-style: italic; }
  
  .inner-block { background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); border-radius: 8px; padding: 8px 12px; margin-top: 2px; flex-shrink: 0; }
  .inner-label { font-size: 8px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
  .inner-val { font-size: 11px; color: var(--text); outline: none; }

  /* Redimensionnement et indicateur visuel */
  .resize-handle { position: absolute; bottom: 0; right: 0; width: 18px; height: 18px; cursor: se-resize; z-index: 30; opacity: 0.7; }
  .resize-handle::after {
    content: ''; position: absolute; right: 4px; bottom: 4px; width: 3px; height: 3px; background: var(--text); border-radius: 50%;
    box-shadow: -4px 0 var(--text), 0 -4px var(--text), -4px -4px var(--text), -8px 0 var(--text), 0 -8px var(--text), -4px -8px var(--text), -8px -4px var(--text);
  }

  .journal-container { display: none; flex: 1; overflow-y: auto; padding: 16px; background: var(--bg-main); flex-direction: column; gap: 12px; }
  .journal-card { background: #14151A; border: 1px solid var(--panel-border); border-left: 4px solid var(--nc); border-radius: 12px; padding: 16px; }
  body.light-theme .journal-card { background: #FFFFFF; }
  .journal-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .journal-meta { display: flex; align-items: center; gap: 12px; }
  .journal-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px; color: var(--text); }
  .journal-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .journal-body { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--panel-border); padding-top: 12px; }
  .journal-chevron { font-size: 12px; color: var(--dim); transition: transform 0.2s; }
  .journal-card.collapsed .journal-body { display: none; }
  .journal-card.collapsed .journal-chevron { transform: rotate(-90deg); }

  [contenteditable="true"]:focus { background: rgba(255,255,255,0.04); border-radius: 4px; outline: none; }
  .flow-line { stroke-dasharray: 8, 6; animation: flowMovement 25s linear infinite; }
  @keyframes flowMovement { to { stroke-dashoffset: -1000; } }

  .sheet {
    position: fixed; top: 0; right: 0; bottom: 0; width: 380px; background: #14151A;
    border-left: 1px solid var(--panel-border); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 200; padding: 24px; transform: translateX(100%); transition: transform 0.3s ease;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5); overflow-y: auto;
  }
  body.light-theme .sheet { background: rgba(255,255,255,0.95); }
  .sheet.open { transform: translateX(0); }
  .sheet-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text); font-size: 28px; cursor: pointer; line-height: 1; display: block; width: 30px; height: 30px; text-align: center; }
  .field { margin-bottom: 20px; }
  .field label { display:block; font-size:10px; text-transform: uppercase; color:var(--dim); margin-bottom:6px; font-weight:600; }
  .field input, .field select { width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--panel-border); border-radius:8px; padding:10px; color:var(--text); font-size:12px; }
  body.light-theme .field input, body.light-theme .field select { background: #FFF; }
  
  .checkbox-group-container { max-height: 140px; overflow-y: auto; border: 1px solid var(--panel-border); background: rgba(0,0,0,0.2); border-radius: 8px; padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); cursor: pointer; }
  .checkbox-row input { width: auto; cursor: pointer; }

  .sheet-tags-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .sheet-tag-row { display: flex; gap: 6px; align-items: center; }
  .btn-danger { background: #ff4a4a; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; width: 100%; text-align: center; }
  .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--panel-border); padding: 8px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 12px; }

  @media (max-width: 1024px) {
    .header-nav { padding: 12px 16px; }
    .header-nav > div:last-child { display: none; } 
    .tabs { display: none !important; }
    .view-toggle { display: flex !important; }
    .app-container.mode-journal #canvasContainer { display: none !important; }
    .app-container.mode-journal #journalContainer { display: flex !important; }
    .app-container.mode-map #canvasContainer { display: block !important; }
    .app-container.mode-map #journalContainer { display: none !important; }
    .sheet { width: 100% !important; border-left: none; }
    .bullet-checkbox { width: 22px; height: 22px; }
    .action-btn { width: 34px; height: 34px; font-size: 16px; }
    .journal-title { font-size: 16px; }
    .journal-sub { font-size: 12px; }
    .fab-add-mobile { display: flex !important; }
  }

  .fab-add-mobile {
    display: none; position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; border-radius: 50%;
    background: var(--text); color: var(--bg-main); font-size: 30px; font-weight: 700; border: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 150; cursor: pointer; align-items: center; justify-content: center;
  }
</style>
</head>
<body class="app-container mode-map">

<!-- PANNEAU CONFIGURATION VIGNETTE -->

  <button class="sheet-close" id="closeSheet">×</button>
  <h3 style="font-family:'Space Grotesk'; margin-top:10px; color:var(--text); margin-bottom: 24px;">Propriétés de la vignette</h3>
  
  <div class="field"><label>Titre</label><input type="text" id="nodeTitleInput"></div>
  <div class="field"><label>Sous-titre</label><input type="text" id="nodeSubInput"></div>
  <div class="field"><label>Icône (Emoji)</label><input type="text" id="nodeIconInput"></div>

  <div class="field" style="display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid var(--panel-border);">

<script>
const SUPABASE_URL = "https://oftfrsezwjjybpohknim.supabase.co";
const SUPABASE_KEY = "sb_publishable_FD8fOiN6Z71LGJQbqL6MEQ_NtKzEReT";
supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let dataset = [];
let currentSearchQuery = "";

const container = document.getElementById('canvasContainer');
const panZoomContent = document.getElementById('panZoomContent');
const journalContainer = document.getElementById('journalContainer');
const svg = document.getElementById('svgFlow');
const app = document.getElementById('app');
const syncStatus = document.getElementById('syncStatus');
let activeNodeId = null;
let tempTags = [];

let transformState = { x: 0, y: 0, scale: 1 };

// Persistance et sauvegarde automatique locale + en ligne
async function save() {
  syncStatus.innerText = "Synchronisation...";
  localStorage.setItem('anthony_system_v6', JSON.stringify(dataset));
  try {
    const { error } = await supabase.from('bento_architecture').upsert({ id: 1, data: dataset });
    if (error) throw error;
    syncStatus.innerText = "Studio Anthony Carrel (En ligne)";
  } catch (err) {
    console.error(err);
    syncStatus.innerText = "Sauvegarde locale active";
  }
}

async function loadData() {
  syncStatus.innerText = "Chargement...";
  if (localStorage.getItem('anthony_system_v6')) {
    dataset = JSON.parse(localStorage.getItem('anthony_system_v6'));
  }
  try {
    const { data, error } = await supabase.from('bento_architecture').select('data').eq('id', 1).single();
    if (!error && data) dataset = data.data;
    syncStatus.innerText = "Studio Anthony Carrel (En ligne)";
  } catch (err) {
    syncStatus.innerText = "Studio Anthony Carrel (Local)";
  }
  if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
  render();
}

function updateTransform() {
  panZoomContent.style.transform = `translate(${transformState.x}px, ${transformState.y}px) scale(${transformState.scale})`;
}

// Interaction du Plan de travail
interact(container).gesturable({
  listeners: {
    move (event) {
      transformState.scale = Math.max(0.1, Math.min(2, transformState.scale * (1 + event.ds)));
      transformState.x += event.dx; transformState.y += event.dy;
      updateTransform(); draw();
    }
  }
}).draggable({
  inertia: true,
  listeners: {
    move (event) {
      if (event.target.closest('.node') || event.target.closest('.sheet')) return;
      transformState.x += event.dx; transformState.y += event.dy;
      updateTransform();
    }
  }
});

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  let newScale = Math.max(0.1, Math.min(2, transformState.scale + (e.deltaY < 0 ? 1 : -1) * 0.05));
  const rect = container.getBoundingClientRect();
  const mX = e.clientX - rect.left; const mY = e.clientY - rect.top;
  transformState.x = mX - (mX - transformState.x) * (newScale / transformState.scale);
  transformState.y = mY - (mY - transformState.y) * (newScale / transformState.scale);
  transformState.scale = newScale;
  updateTransform(); draw();
}, { passive: false });

// Changement de thème rapide
document.getElementById('themeToggleBtn').addEventListener('click', () => {
  document.body.classList.toggle('light-theme');
  localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
});

// Réinitialisation de la disposition
document.getElementById('resetLayoutBtn').addEventListener('click', () => {
  transformState = { x: 0, y: 0, scale: 1 };
  updateTransform();
  dataset.forEach((n, idx) => { n.x = 40 + (idx % 4) * 280; n.y = 40 + Math.floor(idx / 4) * 300; n.w = 240; n.h = 260; });
  save(); render();
});

// Barre de recherche fluide
document.getElementById('searchBar').addEventListener('input', (e) => {
  currentSearchQuery = e.target.value.toLowerCase();
  render();
});

function switchView(mode) {
  document.querySelectorAll('#viewToggle .toggle-btn, .tabs .tab').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-mode') === mode || b.getAttribute('data-target') === mode);
  });
  app.classList.remove('mode-journal', 'mode-map');
  app.classList.add('mode-' + mode);
  if(mode === 'map') setTimeout(() => { draw(); updateTransform(); }, 50);
}

document.querySelectorAll('#viewToggle .toggle-btn, .tabs .tab').forEach(btn => {
  btn.addEventListener('click', (e) => switchView(e.target.getAttribute('data-mode') || e.target.getAttribute('data-target')));
});

// Correction définitive et robuste du Redimensionnement & Déplacement avec alignement magnétique (Snapping à 16px)
function initInteractOnNodes() {
  interact('.node').draggable({
    ignoreFrom: 'input, select, textarea, [contenteditable="true"], .action-btn, .bullets-container, .resize-handle',
    listeners: {
      move(event) {
        const node = dataset.find(n => n.id === event.target.id);
        if (node) {
          let rawX = node.x + event.dx / transformState.scale;
          let rawY = node.y + event.dy / transformState.scale;
          // Ancrage magnétique
          node.x = Math.round(rawX / 16) * 16;
          node.y = Math.round(rawY / 16) * 16;
          event.target.style.left = node.x + 'px';
          event.target.style.top = node.y + 'px';
          draw();
        }
      },
      end() { save(); }
    }
  });

  interact('.resize-handle').draggable({
    listeners: {
      move(event) {
        const nodeEl = event.target.closest('.node');
        const node = dataset.find(n => n.id === nodeEl.id);
        if (node) {
          let rawW = node.w + event.dx / transformState.scale;
          let rawH = (node.h || 260) + event.dy / transformState.scale;
          // Ancrage magnétique pour les dimensions
          node.w = Math.max(180, Math.round(rawW / 16) * 16);
          node.h = Math.max(160, Math.round(rawH / 16) * 16);
          nodeEl.style.width = node.w + 'px';
          nodeEl.style.height = node.h + 'px';
          draw();
        }
      },
      end() { save(); }
    }
  });
}

function draw() {
  svg.innerHTML = '';
  if (app.classList.contains('mode-journal')) return;
  dataset.forEach(n => {
    if (n.parents) {
      n.parents.forEach(pId => {
        const parentNode = dataset.find(item => item.id === pId);
        if (parentNode) {
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          const d = `M ${parentNode.x + parentNode.w / 2} ${parentNode.y + (parentNode.h || 260) / 2} Q ${(parentNode.x + n.x + parentNode.w)/2} ${(parentNode.y + n.y + 260)/2 - 50}, ${n.x + n.w / 2} ${n.y + (n.h || 260) / 2}`;
          path.setAttribute("d", d); path.setAttribute("class", "flow-line");
          path.setAttribute("stroke", n.color || "rgba(255,255,255,0.2)");
          path.setAttribute("stroke-width", "2"); path.setAttribute("fill", "none");
          svg.appendChild(path);
        }
      });
    }
  });
}

document.getElementById('addGlobalNodeBtn').addEventListener('click', () => {
  const newId = 'node_' + Date.now();
  dataset.push({
    id: newId, x: (window.innerWidth / 2 - 110 - transformState.x) / transformState.scale, y: (window.innerHeight / 2 - 120 - transformState.y) / transformState.scale,
    w: 240, h: 260, color: 'var(--gold)', cardBg: '#14151A', icon: '📂', title: 'Nouveau projet', sub: 'Description', parents: [], bullets: ["Objectif initial"], checkedBullets: [], tags: []
  });
  save(); render();
});
document.getElementById('fabAddMobile').addEventListener('click', () => document.getElementById('addGlobalNodeBtn').click());

function openConfigSheet(node) {
  activeNodeId = node.id;
  tempTags = node.tags ? JSON.parse(JSON.stringify(node.tags)) : [];
  document.getElementById('nodeTitleInput').value = node.title || '';
  document.getElementById('nodeSubInput').value = node.sub || '';
  document.getElementById('nodeIconInput').value = node.icon || '';
  document.getElementById('nodeIsBentoInput').checked = !!node.isBento;
  document.getElementById('nodeColorInput').value = node.color || 'var(--gold)';
  document.getElementById('nodeBgColorInput').value = node.cardBg || '#14151A';
  document.getElementById('bgUrlInput').value = node.bg || '';
  document.getElementById('bgOpacityInput').value = node.bgOpacity !== undefined ? node.bgOpacity : 85;
  document.getElementById('showBlockInput').checked = !!node.showBlock;
  document.getElementById('blockLabelInput').value = node.blockLabel || '';
  document.getElementById('blockValInput').value = node.blockVal || '';
  document.getElementById('nodeUseCheckboxesInput').checked = !!node.useCheckboxes;

  const cbGroup = document.getElementById('nodeParentsCheckboxGroup'); cbGroup.innerHTML = '';
  dataset.forEach(n => {
    if (n.id !== node.id) {
      cbGroup.innerHTML += `<label class="checkbox-row"><input type="checkbox" value="${n.id}" ${node.parents && node.parents.includes(n.id) ? 'checked' : ''}> <span>${n.title || 'Sans titre'}</span></label>`;
    }
  });
  renderSheetTags();
  document.getElementById('configSheet').classList.add('open');
}

function renderSheetTags() {
  const container = document.getElementById('sheetTagsList'); container.innerHTML = '';
  tempTags.forEach((t, idx) => {
    container.innerHTML += `
      <div class="sheet-tag-row">
        <input type="text" value="${t.text}" style="flex:2;" oninput="tempTags[${idx}].text=this.value">
        <input type="color" value="${t.color.startsWith('var') ? '#FFB03B' : t.color}" style="flex:1;height:36px;" oninput="tempTags[${idx}].color=this.value">
        <button class="action-btn" style="border:1px solid #ff4a4a; color:#ff4a4a;" onclick="tempTags.splice(${idx},1);renderSheetTags();">×</button>
      </div>`;
  });
}
document.getElementById('sheetAddTagBtn').addEventListener('click', () => { tempTags.push({ text: 'Tag', color: 'var(--gold)' }); renderSheetTags(); });
document.getElementById('closeSheet').addEventListener('click', () => document.getElementById('configSheet').classList.remove('open'));

document.getElementById('saveNodeConfig').addEventListener('click', () => {
  const node = dataset.find(n => n.id === activeNodeId);
  if (node) {
    node.title = document.getElementById('nodeTitleInput').value; node.sub = document.getElementById('nodeSubInput').value;
    node.icon = document.getElementById('nodeIconInput').value; node.isBento = document.getElementById('nodeIsBentoInput').checked;
    node.color = document.getElementById('nodeColorInput').value; node.cardBg = document.getElementById('nodeBgColorInput').value;
    node.bg = document.getElementById('bgUrlInput').value; node.bgOpacity = parseInt(document.getElementById('bgOpacityInput').value);
    node.showBlock = document.getElementById('showBlockInput').checked; node.blockLabel = document.getElementById('blockLabelInput').value;
    node.blockVal = document.getElementById('blockValInput').value; node.useCheckboxes = document.getElementById('nodeUseCheckboxesInput').checked;
    node.tags = tempTags;
    node.parents = Array.from(document.querySelectorAll('#nodeParentsCheckboxGroup input:checked')).map(cb => cb.value);
    save(); render();
  }
  document.getElementById('configSheet').classList.remove('open');
});

document.getElementById('deleteNodeBtn').addEventListener('click', () => {
  if (confirm("Supprimer cette vignette ?")) {
    dataset = dataset.filter(n => n.id !== activeNodeId);
    dataset.forEach(n => { if(n.parents) n.parents = n.parents.filter(p => p !== activeNodeId); });
    save(); render(); document.getElementById('configSheet').classList.remove('open');
  }
});

function render() {
  document.querySelectorAll('.node').forEach(n => n.remove());
  
  // Filtrage des données selon le champ de recherche
  const filteredDataset = dataset.filter(n => 
    (n.title && n.title.toLowerCase().includes(currentSearchQuery)) || 
    (n.sub && n.sub.toLowerCase().includes(currentSearchQuery))
  );

  filteredDataset.forEach(n => {
    const div = document.createElement('div');
    div.className = 'node' + (n.isBento ? ' bento-style' : ''); div.id = n.id;
    div.style.left = n.x + 'px'; div.style.top = n.y + 'px'; div.style.width = n.w + 'px';
    if(n.h) div.style.height = n.h + 'px';
    div.style.setProperty('--nc', n.color); div.style.backgroundColor = n.cardBg;

    let bgLayerHTML = n.bg ? `<div class="node-bg-layer" style="background-image: url('${n.bg}'); opacity: ${(n.bgOpacity / 100).toFixed(2)};"></div><div class="node-overlay"></div>` : '';
    let blockHTML = n.showBlock ? `<div class="inner-block"><div class="inner-label">${n.blockLabel}</div><div class="inner-val" contenteditable="true" data-prop="blockVal">${n.blockVal || ''}</div></div>` : '';
    
    let tagsHTML = '<div class="tags-container">';
    (n.tags || []).forEach((t, i) => { tagsHTML += `<div class="tag-item" contenteditable="true" data-tag-idx="${i}" style="--tc: ${t.color}">${t.text}</div>`; });
    tagsHTML += '</div>';

    let bulletsHTML = '';
    (n.bullets || []).forEach((bText, idx) => {
      bulletsHTML += `
        <div class="bullet-item ${n.checkedBullets.includes(idx) ? 'checked' : ''}" data-index="${idx}">
          ${n.useCheckboxes ? '<div class="bullet-checkbox"></div>' : '<div class="bullet-dot"></div>'}
          <div class="bullet-text" contenteditable="true">${bText}</div>
        </div>`;
    });

    div.innerHTML = `
      ${bgLayerHTML}
      <div class="node-content">
        <div class="node-header">
          <div style="display:flex; align-items:center; gap:8px;">
            <span class="icon-badge">${n.icon}</span>
            <div>
              <div class="title" contenteditable="true" data-prop="title">${n.title || 'Sans titre'}</div>
              <div class="sub" contenteditable="true" data-prop="sub">${n.sub || ''}</div>
            </div>
          </div>
          <div class="header-actions">
            <button class="action-btn add-bullet-btn">+</button>
            <button class="action-btn settings-btn">⚙️</button>
          </div>
        </div>
        <div class="bullets-container">${bulletsHTML}</div>
        ${tagsHTML} ${blockHTML}
      </div>
      <div class="resize-handle"></div>
    `;

    div.querySelectorAll('[contenteditable="true"]').forEach(el => {
      el.addEventListener('blur', (e) => {
        const prop = e.target.getAttribute('data-prop');
        const tIdx = e.target.getAttribute('data-tag-idx');
        if (prop) n[prop] = e.target.innerText;
        else if (tIdx) n.tags[tIdx].text = e.target.innerText;
        save();
      });
    });

    div.querySelectorAll('.bullet-text').forEach(el => {
      el.addEventListener('blur', (e) => {
        const idx = e.target.closest('.bullet-item').getAttribute('data-index');
        const text = e.target.innerText.trim();
        if (text === "") n.bullets.splice(idx, 1); else n.bullets[idx] = text;
        save(); render();
      });
    });

    div.querySelectorAll('.bullet-checkbox, .bullet-dot').forEach(el => {
      el.addEventListener('click', (e) => {
        const idx = parseInt(e.target.closest('.bullet-item').getAttribute('data-index'));
        n.checkedBullets = n.checkedBullets.includes(idx) ? n.checkedBullets.filter(i => i !== idx) : [...n.checkedBullets, idx];
        save(); render();
      });
    });

    div.querySelector('.add-bullet-btn').addEventListener('click', () => { n.bullets.push(""); save(); render(); });
    div.querySelector('.settings-btn').addEventListener('click', () => openConfigSheet(n));
    panZoomContent.appendChild(div);
  });

  // Rendu du journal simplifié avec filtrage identique
  journalContainer.innerHTML = '';
  filteredDataset.forEach(n => {
    const card = document.createElement('div'); card.className = 'journal-card'; card.style.setProperty('--nc', n.color);
    card.innerHTML = `<div class="journal-header"><div class="journal-meta"><span class="icon-badge">${n.icon}</span><div><div class="journal-title">${n.title}</div><div class="journal-sub">${n.sub || ''}</div></div></div><button class="action-btn journal-settings-btn">⚙️</button></div>`;
    card.querySelector('.journal-settings-btn').addEventListener('click', () => openConfigSheet(n));
    journalContainer.appendChild(card);
  });

  initInteractOnNodes(); draw();
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
