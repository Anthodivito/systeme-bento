<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système Bento — Anthony Carrel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .bento-card { background: #111; border: 1px solid #222; border-radius: 1rem; padding: 1.5rem; transition: all 0.3s ease; }
        .bento-card:hover { border-color: #444; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-black text-gray-100 min-h-screen p-6 md:p-12">

    <header class="max-w-7xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-white">Architecture Bento</h1>
            <p class="text-gray-400 mt-1">Anthony Carrel Photographie — Pilote SEO & E-E-A-T 2026</p>
        </div>
        <div class="flex items-center gap-3">
            <span id="sync-status" class="text-xs px-3 py-1.5 rounded-full bg-yellow-500/10 text-yellow-400 font-medium border border-yellow-500/20">
                Connexion à Supabase...
            </span>
            <button onclick="addNewCard()" class="bg-white text-black text-sm font-semibold px-4 py-2 rounded-lg hover:bg-gray-200 transition">
                + Ajouter une carte
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="grid-container" class="bento-grid">
            <!-- Les cartes s'afficheront ici -->
        </div>
    </main>

    <script>
        // Configuration de ta base de données Supabase
        const SUPABASE_URL = "https://oftfrsezwjjybpohknim.supabase.co";
        const SUPABASE_KEY = "sb_publishable_FD8fOiN6Z71LGJQbqL6MEQ_NtKzEReT";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Données d'origine basées sur ton écosystème 2026
        const defaultDataset = [
            { id: 1, title: "Profil de Marque", content: "Anthony Carrel, photographe premium basé à Cannes. Spécialisé en événementiel de luxe, mode et tapis rouge.", tag: "Identité", color: "border-blue-500/30" },
            { id: 2, title: "Signal E-E-A-T : Chanel", content: "Accompagnement VIP du marché coréen dans le Sud de la France. Discrétion absolue et flux rapide.", tag: "Preuve", color: "border-purple-500/30" },
            { id: 3, title: "Signal E-E-A-T : Piaget", content: "Scénographie haute joaillerie à Menton et concert privé de Sophie Ellis-Bextor.", tag: "Preuve", color: "border-purple-500/30" },
            { id: 4, title: "Silo SEO Principal", content: "Page Mère 'Photographe Événementiel Cannes' maillée avec le Portfolio Martinez Hôtel.", tag: "SEO", color: "border-emerald-500/30" }
        ];

        let currentCards = [];
        let isSaving = false;

        // Statut visuel de la synchronisation
        function updateStatus(text, type) {
            const el = document.getElementById('sync-status');
            el.textContent = text;
            el.className = `text-xs px-3 py-1.5 rounded-full font-medium border ${
                type === 'success' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' :
                type === 'error' ? 'bg-red-500/10 text-red-400 border-red-500/20' :
                'bg-yellow-500/10 text-yellow-400 border-yellow-500/20'
            }`;
        }

        // Charger les données depuis Supabase
        async function loadData() {
            try {
                const { data, error } = await supabase
                    .from('bento_data')
                    .select('cards_json')
                    .eq('id', 1)
                    .single();

                if (error) throw error;

                // Si la base est vide ou introuvable, on prend le jeu de données par défaut
                if (!data || !data.cards_json || data.cards_json.length === 0) {
                    currentCards = defaultDataset;
                    await saveData(true); 
                } else {
                    currentCards = data.cards_json;
                }

                renderGrid();
                updateStatus('Synchronisé en temps réel', 'success');
            } catch (err) {
                console.error(err);
                updateStatus('Erreur de chargement', 'error');
            }
        }

        // Sauvegarder les données dans Supabase
        async function saveData(silent = false) {
            if (isSaving) return;
            isSaving = true;
            if (!silent) updateStatus('Sauvegarde...', 'pending');

            try {
                const { error } = await supabase
                    .from('bento_data')
                    .update({ cards_json: currentCards, updated_at: new Date() })
                    .eq('id', 1);

                if (error) throw error;
                updateStatus('Synchronisé en temps réel', 'success');
            } catch (err) {
                console.error(err);
                updateStatus('Erreur de sauvegarde', 'error');
            } finally {
                isSaving = false;
            }
        }

        // Afficher graphiquement les cartes bento
        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            currentCards.forEach((card, index) => {
                const div = document.createElement('div');
                div.className = `bento-card border ${card.color || 'border-gray-800'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-xs uppercase font-bold tracking-wider text-gray-500">${card.tag || 'Projet'}</span>
                        <button onclick="deleteCard(${index})" class="text-gray-600 hover:text-red-400 text-xs transition">Supprimer</button>
                    </div>
                    <h2 class="text-lg font-bold text-white mb-2 outline-none focus:text-yellow-400" contenteditable="true" onblur="updateCard(${index}, 'title', this.innerText)">${card.title}</h2>
                    <p class="text-sm text-gray-400 leading-relaxed outline-none focus:text-white" contenteditable="true" onblur="updateCard(${index}, 'content', this.innerText)">${card.content}</p>
                `;
                container.appendChild(div);
            });
        }

        // Fonctions d'interaction
        function updateCard(index, field, value) {
            if (currentCards[index][field] !== value) {
                currentCards[index][field] = value;
                saveData();
            }
        }

        function addNewCard() {
            currentCards.push({
                id: Date.now(),
                title: "Nouveau titre",
                content: "Cliquez ici pour modifier le texte de cette carte.",
                tag: "Idée",
                color: "border-gray-700"
            });
            renderGrid();
            saveData();
        }

        function deleteCard(index) {
            if(confirm("Supprimer cette carte ?")) {
                currentCards.splice(index, 1);
                renderGrid();
                saveData();
            }
        }

        // Système d'écoute (Polling) toutes les 3 secondes pour mettre à jour le téléphone/ordinateur en arrière-plan
        setInterval(async () => {
            if (!isSaving && document.activeElement.getAttribute('contenteditable') !== 'true') {
                try {
                    const { data } = await supabase.from('bento_data').select('cards_json').eq('id', 1).single();
                    if (data && JSON.stringify(data.cards_json) !== JSON.stringify(currentCards)) {
                        currentCards = data.cards_json;
                        renderGrid();
                    }
                } catch (e) { console.log("Vérification arrière-plan..."); }
            }
        }, 3000);

        // Lancement initial au chargement de la page
        loadData();
    </script>
</body>
</html>
